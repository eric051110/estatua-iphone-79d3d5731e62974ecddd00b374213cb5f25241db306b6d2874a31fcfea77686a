name: Añadir iconos de la app

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Crear iconos
        shell: bash
        run: |
          echo '' | base64 --decode > icon-180.png
          echo '' | base64 --decode > icon-192.png
          echo '' | base64 --decode > icon-512.png
      - name: Guardar iconos en el repositorio
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add icon-180.png icon-192.png icon-512.png
          git diff --cached --quiet || git commit -m 'Añadir iconos de la app'
          git push
